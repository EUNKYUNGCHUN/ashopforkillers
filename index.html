<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>킬러들의 쇼핑몰 시즌2 SNS 이벤트</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  min-height: 100%;
  background: #000;
}

body {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  font-family: Arial, sans-serif;
}

.wrapper {
  position: relative;
  width: 100%;
  max-width: 828px;
  margin: 0 auto;
  cursor: pointer;
}

.poster {
  width: 100%;
  height: auto;
  display: block;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 30px;
  transform: translateX(-50%);
  background: #e60012;
  color: #fff;
  padding: 14px 24px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: bold;
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
  z-index: 9999;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  visibility: visible;
}
</style>
</head>

<body>

<div class="wrapper" onclick="copyHashtag()">
  <img src="hashtag1.png" alt="킬러들의 쇼핑몰 시즌2 SNS 이벤트" class="poster">
</div>

<div id="toast" class="toast">
  해시태그가 복사되었습니다!
</div>

<script>
function copyHashtag() {
  const hashtags = `#킬러들의쇼핑몰2
#머더헬프강남점오픈
#디즈니플러스
@disneypluskr`;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(hashtags)
      .then(showToast)
      .catch(function() {
        fallbackCopy(hashtags);
      });
  } else {
    fallbackCopy(hashtags);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement("textarea");
  textarea.value = text;
  textarea.style.position = "fixed";
  textarea.style.left = "-9999px";
  textarea.style.top = "-9999px";
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  try {
    document.execCommand("copy");
    showToast();
  } catch (err) {
    alert("복사에 실패했습니다. 해시태그를 직접 복사해 주세요.");
  }

  document.body.removeChild(textarea);
}

function showToast() {
  const toast = document.getElementById("toast");
  toast.classList.add("show");

  setTimeout(function() {
    toast.classList.remove("show");
  }, 2000);
}
</script>

</body>
</html>
