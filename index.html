<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>킬러들의 쇼핑몰2 SNS 이벤트</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  min-height: 100%;
  background: #000;
}

body {
  display: flex;
  justify-content: center;
  font-family: Arial, sans-serif;
}

.wrapper {
  position: relative;
  width: 100%;
  max-width: 828px;
  margin: 0 auto;
}

.poster {
  width: 100%;
  display: block;
}

.copy-button {
  position: absolute;
  left: 50%;
  bottom: 18.5%;
  transform: translateX(-50%);
  width: 50%;
  height: 4.5%;
  background: transparent;
  border: none;
  cursor: pointer;
  z-index: 10;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 30px;
  transform: translateX(-50%);
  background: #e60012;
  color: #fff;
  padding: 14px 24px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: bold;
  opacity: 0;
  visibility: hidden;
  transition: 0.3s;
  z-index: 999;
  white-space: nowrap;
}

.toast.show {
  opacity: 1;
  visibility: visible;
}
</style>
</head>

<body>

<div class="wrapper">

  <img src="./hashtag.png" class="poster" alt="<킬러들의 쇼핑몰 시즌2> 머더헬프 강남점">

)" aria-label="해시태그 복사하기"></button>

</div>

<div id="toast" class="toast">
  해시태그가 복사되었습니다!
</div>

<script>
function copyHashtag() {
  const hashtags = `#킬러들의쇼핑몰2
#머더헬프강남점오픈
#디즈니플러스
@disneypluskr`;

  navigator.clipboard.writeText(hashtags).then(() => {
    const toast = document.getElementById("toast");
    toast.classList.add("show");

    setTimeout(() => {
      toast.classList.remove("show");
    }, 2000);
  }).catch(() => {
    alert("복사에 실패했습니다. 다시 시도해 주세요.");
  });
}
</script>

</body>
</html>
``
